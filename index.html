<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IoT Motor SCADA Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #0f172a;
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    margin-top: 20px;
    border-radius: 10px;
}

h1 {
    text-align: center;
    color: #38bdf8;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 5px;
}

button {
    padding: 10px;
    width: 100%;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.login-btn { background: #22c55e; color: white; }
.logout-btn { background: #ef4444; color: white; }

.on { background: #22c55e; color: white; }
.off { background: #ef4444; color: white; }

.status {
    font-size: 20px;
    margin-top: 10px;
}

.green { color: #22c55e; }
.red { color: #ef4444; }

.log {
    background: #0f172a;
    padding: 10px;
    height: 120px;
    overflow-y: scroll;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 IoT Motor SCADA Dashboard</h1>

<!-- LOGIN -->
<div class="card" id="loginCard">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button class="login-btn" onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="card" id="dashboard" style="display:none;">

    <h2>Control Panel</h2>

    <button class="on" onclick="setMotor('ON')">TURN MOTOR ON</button>
    <button class="off" onclick="setMotor('OFF')">TURN MOTOR OFF</button>

    <div class="status">
        Motor Status: <span id="motorStatus">---</span>
    </div>

    <div class="status">
        Temperature: <span id="temp">--</span> °C
    </div>

    <h3>Activity Log</h3>
    <div class="log" id="log"></div>

    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

</div>

<script>
// ================= FIREBASE CONFIG =================
const firebaseConfig = {
  apiKey: "AIzaSyD_q5QfIyQSEVGQhGb1Xrkk1FTSi1fCxzw",
  authDomain: "motor-scada-27050.firebaseapp.com",
  databaseURL: "https://motor-scada-27050-default-rtdb.firebaseio.com",
  projectId: "motor-scada-27050",
  storageBucket: "motor-scada-27050.firebasestorage.app",
  messagingSenderId: "825566900149",
  appId: "1:825566900149:web:ae727f98d33301251873fc"
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

// ================= LOGIN =================
function login() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
    .then(() => {
        document.getElementById("loginCard").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        listenData();
    })
    .catch(err => alert(err.message));
}

// ================= LOGOUT =================
function logout() {
    auth.signOut();
    location.reload();
}

// ================= CONTROL MOTOR =================
function setMotor(state) {
    db.ref("/motor/state").set(state);
}

// ================= LIVE DATA =================
function listenData() {

    // MOTOR STATE
    db.ref("/motor/state").on("value", snap => {
        let state = snap.val();
        let el = document.getElementById("motorStatus");

        el.innerText = state;

        if (state === "ON") {
            el.className = "green";
        } else {
            el.className = "red";
        }
    });

    // TEMPERATURE
    db.ref("/temperature").on("value", snap => {
        document.getElementById("temp").innerText = snap.val();
    });

    // LOGS
    db.ref("/logs").on("value", snap => {
        let log = document.getElementById("log");
        log.innerHTML = snap.val() + "<br>" + log.innerHTML;
    });
}

// ================= AUTH STATE =================
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById("loginCard").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        listenData();
    }
});
</script>

</body>
</html>
